{{- if .Values.aggregator.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: detective-aggregator
  namespace: {{ include "kubectl-detective.namespace" . }}
  labels:
    {{- include "kubectl-detective.labels" . | nindent 4 }}
    app.kubernetes.io/component: aggregator
spec:
  type: {{ .Values.aggregator.service.type }}
  selector:
    {{- include "kubectl-detective.aggregatorSelectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.aggregator.listenPort }}
      targetPort: {{ .Values.aggregator.listenPort }}
      protocol: TCP
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detective-aggregator
  namespace: {{ include "kubectl-detective.namespace" . }}
  labels:
    {{- include "kubectl-detective.labels" . | nindent 4 }}
    app.kubernetes.io/component: aggregator
spec:
  replicas: {{ .Values.aggregator.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubectl-detective.aggregatorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubectl-detective.aggregatorSelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: aggregator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/kubectl-detective
            - aggregator
            - --listen=:{{ .Values.aggregator.listenPort }}
          ports:
            - containerPort: {{ .Values.aggregator.listenPort }}
              name: grpc
              protocol: TCP
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.aggregator.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.aggregator.listenPort }}
            initialDelaySeconds: {{ .Values.aggregator.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.aggregator.readinessProbe.periodSeconds }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.aggregator.listenPort }}
            initialDelaySeconds: {{ .Values.aggregator.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.aggregator.livenessProbe.periodSeconds }}
      terminationGracePeriodSeconds: 10
{{- end }}
