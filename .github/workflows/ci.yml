name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile eBPF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include \
            -c bpf/tcp_connect.bpf.c -o internal/flow/tcp_connect.bpf.o
          llvm-strip -g internal/flow/tcp_connect.bpf.o

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile eBPF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include \
            -c bpf/tcp_connect.bpf.c -o internal/flow/tcp_connect.bpf.o
          llvm-strip -g internal/flow/tcp_connect.bpf.o

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile eBPF
        if: matrix.goarch == 'amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include \
            -c bpf/tcp_connect.bpf.c -o internal/flow/tcp_connect.bpf.o
          llvm-strip -g internal/flow/tcp_connect.bpf.o

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o bin/kubectl-detective_linux_${GOARCH} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubectl-detective_linux_${{ matrix.goarch }}
          path: bin/

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts

      - name: Helm template
        run: helm template test charts
